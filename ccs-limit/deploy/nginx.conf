pid /home/ezra/.ccs-dashboard/run/ccs-limit-nginx.pid;
error_log /home/ezra/.ccs-dashboard/logs/ccs-limit-nginx-error.log warn;
worker_processes 1;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 5s;
    keepalive_requests 1000;
    reset_timedout_connection on;
    client_max_body_size 0;

    map $request $unsafe_absolute_target {
        default 0;
        ~^[A-Z]+\s+(?:[a-z][a-z0-9+.-]*://|//) 1;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' '';
    }

    upstream ccs_limit_native {
        server 127.0.0.1:18098;
        keepalive 256;
    }

    server {
        listen 0.0.0.0:8098 backlog=4096;

        if ($unsafe_absolute_target) {
            return 400;
        }

        location / {
            proxy_pass http://ccs_limit_native;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_max_temp_file_size 0;
            proxy_socket_keepalive on;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_next_upstream off;
        }
    }
}
